<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL — Autonomous Breach Response</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#000000;--panel:#080808;--card:#111111;--card2:#1a1a1a;--border:#1e1e1e;
  --t1:#e4e4e7;--t2:#a1a1aa;--t3:#52525b;
  --red:#ef4444;--orange:#f97316;--yellow:#eab308;--green:#22c55e;--blue:#e4e4e7;--purple:#a78bfa;--cyan:#67e8f9;
}
body{background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh;}
.mono{font-family:'JetBrains Mono',monospace;}

/* BG */
.bg-grid{display:none;}
.bg-glow{display:none;}

/* Banner */
.banner{position:relative;z-index:10;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;
  background:#080808;border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:12px;}
.brand .shield{width:36px;height:36px;border-radius:9px;background:#1a1a1a;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:18px;}
.brand h1{font-size:18px;font-weight:800;}
.brand .accent{color:var(--t1);}
.brand .sub{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}
.badge{padding:6px 16px;border-radius:20px;font-weight:700;font-size:12px;display:flex;align-items:center;gap:8px;
  letter-spacing:.5px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;transition:all .5s;}
.badge .dot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 8px currentColor;animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
.b-idle{background:rgba(71,85,105,.12);color:#64748b;border:1px solid rgba(71,85,105,.25);}
.b-idle .dot{background:#64748b;}
.b-scan{background:rgba(161,161,170,.1);color:#d4d4d8;border:1px solid rgba(161,161,170,.2);}
.b-scan .dot{background:#d4d4d8;}
.b-red{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25);box-shadow:0 0 20px rgba(239,68,68,.1);}
.b-red .dot{background:var(--red);}
.b-orange{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.25);}
.b-orange .dot{background:var(--orange);}
.b-green{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25);box-shadow:0 0 20px rgba(34,197,94,.1);}
.b-green .dot{background:var(--green);animation:none;}
.timer{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--t1);}
.timer-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;text-align:right;}

/* Pipeline */
.pipeline{position:relative;z-index:10;display:flex;align-items:stretch;padding:0 28px;height:64px;
  background:#080808;border-bottom:1px solid var(--border);gap:0;}
.pipe-step{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);
  border-bottom:3px solid transparent;transition:all .4s;position:relative;}
.pipe-step .num{width:22px;height:22px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;
  background:var(--card);border:1.5px solid var(--border);font-weight:700;transition:all .4s;}
.pipe-step.active{color:var(--t1);border-bottom-color:var(--t1);}
.pipe-step.active .num{background:var(--t1);color:#000;border-color:var(--t1);}
.pipe-step.done{color:var(--green);}
.pipe-step.done .num{background:var(--green);color:#fff;border-color:var(--green);}
.pipe-arrow{display:flex;align-items:center;color:var(--border);font-size:14px;padding:0 2px;transition:color .4s;}
.pipe-arrow.done{color:var(--green);}
.pipeline.tabbed{gap:4px;padding:6px 28px;}
.pipeline.tabbed .pipe-arrow{display:none;}
.pipeline.tabbed .pipe-step{cursor:pointer;border:1px solid var(--border);border-bottom:2px solid transparent;
  border-radius:6px;padding:0 14px;height:42px;transition:all .2s;}
.pipeline.tabbed .pipe-step .num{display:none;}
.pipeline.tabbed .pipe-step:hover{background:rgba(255,255,255,.04);border-color:var(--t3);}
.pipeline.tabbed .pipe-step.tab-active{background:rgba(255,255,255,.06);border-color:var(--t2);color:var(--t1);border-bottom-color:var(--t1);}
.pipeline.tabbed .pipe-step.done{color:var(--t3);}

/* Main content — fixed two-column layout */
.main{position:relative;z-index:10;height:calc(100vh - 130px);display:grid;grid-template-columns:1fr 400px;overflow:hidden;}
.left-panel{padding:20px 24px;overflow-y:auto;scrollbar-width:none;border-right:1px solid var(--border);display:flex;flex-direction:column;}
.left-panel::-webkit-scrollbar{display:none;}
.right-panel{padding:20px 24px;display:flex;flex-direction:column;overflow:hidden;}
.right-panel .log-feed{flex:1;overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.right-panel .log-feed::-webkit-scrollbar{width:5px;}
.right-panel .log-feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.slabel{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);font-weight:700;margin-bottom:12px;}

/* Monitor screen */
#monitorScreen{display:flex;flex-direction:column;flex:1;}
.monitor-feed{flex:1;overflow:hidden;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.9;color:var(--t3);}
.monitor-feed .mf-ok{color:var(--green);opacity:.5;}
.monitor-feed .mf-info{color:var(--t3);}
.monitor-feed .mf-time{color:#1e293b;margin-right:6px;}
.monitor-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:auto;}
.mstat{background:var(--card);border-radius:8px;padding:12px;border:1px solid var(--border);text-align:center;}
.mstat .msv{font-size:24px;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--green);}
.mstat .msl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.source-list{flex:1;overflow:hidden;}
.source-item{padding:6px 10px;margin-bottom:4px;border-radius:6px;background:var(--card);border-left:2px solid var(--green);
  font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--t3);display:flex;justify-content:space-between;opacity:.6;}
.source-item .src-status{color:var(--green);font-weight:600;}

/* Scan animation */
.scan-vis{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;grid-column:1/-1;}
.scan-domains{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--t3);line-height:2;text-align:center;max-height:300px;overflow:hidden;}
.scan-domains .hit{color:var(--red);font-weight:700;text-shadow:0 0 10px rgba(239,68,68,.3);}
.scan-domains .checked{color:var(--green);opacity:.4;}
.scan-counter{font-size:14px;color:var(--t2);margin-top:16px;font-family:'JetBrains Mono',monospace;}
.scan-counter b{color:var(--t1);font-size:20px;}

/* Breach found flash */
.breach-flash{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;grid-column:1/-1;animation:flashIn .3s ease;}
@keyframes flashIn{from{opacity:0;}to{opacity:1;}}
.breach-flash h2{font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.breach-flash .detail{color:var(--t2);font-size:13px;max-width:400px;text-align:center;line-height:1.6;font-family:'JetBrains Mono',monospace;}

/* Match visualization */
.match-grid{display:grid;grid-template-columns:repeat(25,1fr);gap:2px;margin-bottom:16px;}
.dot{width:100%;aspect-ratio:1;border-radius:2px;background:#1e293b;transition:all .3s;}
.dot.crit{background:var(--red);box-shadow:0 0 4px rgba(239,68,68,.3);}
.dot.warn{background:var(--yellow);box-shadow:0 0 4px rgba(234,179,8,.3);}
.dot.safe{background:var(--green);opacity:.4;}
.match-stats{display:flex;gap:16px;margin-top:12px;}
.match-stat{flex:1;background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);text-align:center;position:relative;overflow:hidden;}
.match-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.match-stat.ms-c::before{background:var(--red);}
.match-stat.ms-w::before{background:var(--yellow);}
.match-stat.ms-s::before{background:var(--green);}
.match-stat .mv{font-size:32px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.ms-c .mv{color:var(--red);}
.ms-w .mv{color:var(--yellow);}
.ms-s .mv{color:var(--green);}
.match-stat .ml{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-top:4px;}

/* User cards (horizontal) */
.user-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.ucard{background:var(--card);border-radius:10px;padding:12px;border:1px solid var(--border);transition:all .4s;position:relative;overflow:hidden;font-size:12px;}
.ucard.uc-noanswer{opacity:.7;}
.ucard.uc-noanswer::before{background:var(--yellow)!important;}
.ucard.uc-unlocked::before{background:var(--green)!important;box-shadow:0 0 15px rgba(34,197,94,.3)!important;}
.ucard.uc-locked::before{background:var(--red)!important;}
.ucard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border);transition:all .5s;}
.ucard.uc-active::before{background:var(--t2);}
.ucard.uc-done::before{background:var(--green);box-shadow:0 0 15px rgba(34,197,94,.3);}
.ucard .uname{font-size:15px;font-weight:700;}
.ucard .uemail{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.ucard .ubadge{display:inline-block;font-size:9px;padding:3px 8px;border-radius:5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:6px;
  background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2);}
.ucard .usteps{margin-top:12px;display:flex;flex-direction:column;gap:6px;}
.ustep{font-size:12px;display:flex;align-items:center;gap:8px;color:var(--t3);font-weight:500;transition:color .3s;}
.ustep.s-done{color:var(--green);}
.ustep.s-active{color:var(--yellow);}
.ustep .si{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .3s;}
.si.si-pending{background:rgba(71,85,105,.15);color:var(--t3);}
.si.si-active{background:rgba(161,161,170,.15);color:var(--t2);animation:pulse 1s infinite;}
.si.si-done{background:rgba(34,197,94,.15);color:var(--green);}

/* Waveform */
.wave{display:none;margin-top:10px;padding:8px 12px;background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);
  border-radius:8px;align-items:center;gap:8px;}
.wave.active{display:flex;}
.wave-label{font-size:10px;color:var(--purple);font-weight:700;white-space:nowrap;}
.wave-bars{display:flex;align-items:center;gap:2px;flex:1;height:20px;}
.wbar{width:3px;background:var(--purple);border-radius:2px;animation:wv .8s ease-in-out infinite alternate;}
@keyframes wv{0%{height:3px;opacity:.3;}100%{height:18px;opacity:1;}}

/* Decision cards */
.decision-card{background:rgba(139,92,246,.05);border:1px solid rgba(139,92,246,.15);border-radius:10px;padding:14px;margin-bottom:10px;animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.decision-card .dname{font-weight:700;font-size:14px;margin-bottom:6px;}
.decision-card .daction{font-weight:800;font-size:13px;margin-bottom:4px;}
.decision-card .dreason{font-size:12px;color:var(--t2);line-height:1.5;}

/* Log feed (compact) */
.log-feed{display:flex;flex-direction:column;gap:4px;}
.lf-entry{padding:8px 12px;border-radius:8px;background:var(--card);border-left:3px solid var(--border);
  font-size:12px;line-height:1.5;animation:fadeUp .3s ease;}
.lf-entry .lf-time{font-family:'JetBrains Mono',monospace;color:var(--t3);font-size:10px;margin-right:6px;}
.lf-entry.lf-action{border-left-color:var(--t3);}
.lf-entry.lf-crit{border-left-color:var(--red);background:rgba(239,68,68,.03);}
.lf-entry.lf-success{border-left-color:var(--green);}
.lf-entry.lf-decision{border-left-color:var(--purple);background:rgba(139,92,246,.04);}
.lf-entry b{color:var(--t1);font-weight:600;}

/* API ticker */
.api-tick{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;margin-bottom:2px;border-radius:4px;
  background:rgba(6,10,19,.6);border:1px solid #1a2440;display:flex;gap:6px;color:var(--t3);animation:fadeUp .2s ease;}
.api-tick .am{color:var(--cyan);font-weight:700;}
.api-tick .aok{color:var(--green);font-weight:700;}

/* Time compare bar */
.time-bar{display:none;padding:12px 28px;background:#080808;border-top:1px solid var(--border);
  align-items:center;gap:20px;}
.time-bar.visible{display:flex;}
.tb-row{display:flex;align-items:center;gap:10px;flex:1;}
.tb-label{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;min-width:90px;}
.tb-barbg{flex:1;height:8px;background:var(--card);border-radius:4px;overflow:hidden;}
.tb-fill{height:100%;border-radius:4px;transition:width 2s cubic-bezier(.16,1,.3,1);}
.tb-time{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;min-width:70px;text-align:right;}

/* Complete summary */
.complete-summary{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;grid-column:1/-1;text-align:center;}
.complete-summary h2{font-size:28px;font-weight:900;color:var(--green);margin-bottom:16px;}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:700px;margin:16px 0;}
.sg-item{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);}
.sg-item .sv{font-size:28px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.sg-item .sl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}

/* Research pipeline */
.research-pipeline{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.rp-node{background:var(--card);border-radius:8px;padding:10px 14px;border:1px solid var(--border);
  display:flex;align-items:center;gap:10px;font-size:12px;transition:all .4s;animation:fadeUp .3s ease;}
.rp-node .rp-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:11px;flex-shrink:0;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-0.5px;}
.rp-icon.ico-aerospike{background:rgba(239,68,68,.15)!important;color:#f87171!important;border:1.5px solid rgba(239,68,68,.25);}
.rp-icon.ico-senso{background:rgba(16,185,129,.15)!important;color:#34d399!important;border:1.5px solid rgba(16,185,129,.25);}
.rp-icon.ico-airbyte{background:rgba(99,102,241,.15)!important;color:#a5b4fc!important;border:1.5px solid rgba(99,102,241,.25);}
.rp-icon.ico-claude{background:rgba(212,165,116,.2)!important;color:#d4a574!important;border:1.5px solid rgba(212,165,116,.3);}
.rp-icon.ico-ghost{background:rgba(168,85,247,.15)!important;color:#c084fc!important;border:1.5px solid rgba(168,85,247,.25);}
.rp-icon.ico-overmind{background:rgba(99,102,241,.15)!important;color:#818cf8!important;border:1.5px solid rgba(99,102,241,.25);}
.rp-icon.ico-auth0{background:rgba(235,84,36,.15)!important;color:#fb923c!important;border:1.5px solid rgba(235,84,36,.25);}
.rp-icon.ico-truefoundry{background:rgba(245,158,11,.15)!important;color:#fbbf24!important;border:1.5px solid rgba(245,158,11,.25);}
.rp-node .rp-src{color:var(--t2);font-weight:600;min-width:80px;}
.rp-node .rp-detail{color:var(--t3);flex:1;font-size:11px;}
.rp-node .rp-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
.rp-node.rp-active{border-color:rgba(161,161,170,.3);}
.rp-node.rp-active .rp-icon{background:rgba(161,161,170,.1);color:var(--t2);}
.rp-node.rp-done{border-color:rgba(34,197,94,.2);}
.rp-node.rp-done .rp-icon{background:rgba(34,197,94,.15);color:var(--green);}
.rp-finding{background:rgba(139,92,246,.05);border:1px solid rgba(139,92,246,.15);border-radius:8px;
  padding:10px 14px;margin-top:4px;font-size:11px;color:var(--t2);line-height:1.5;animation:fadeUp .3s ease;}
.rp-finding b{color:var(--t1);}

/* Report */
.report-section{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);
  margin-bottom:8px;animation:fadeUp .3s ease;}
.report-section .rs-title{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.report-section .rs-body{font-size:11px;color:var(--t2);line-height:1.6;}
.report-section .rs-body b{color:var(--t1);}
.report-badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.5px;}

/* Download buttons */
.dl-btn{flex:1;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--card);
  color:var(--t1);font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;}
.dl-btn:hover{background:var(--card2);border-color:var(--t3);}

/* Footer */
.footer{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:8px 28px;background:#080808;
  border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;color:var(--t3);}
.footer .sp{color:var(--t2);font-weight:500;}
.footer .sep{color:#1e293b;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow bg-g1"></div>
<div class="bg-glow bg-g2"></div>

<div class="banner">
  <div class="brand"><div class="shield">&#128737;</div><div><h1><span class="accent">SENTINEL</span></h1><div class="sub">Autonomous Breach Response</div></div></div>
  <div id="badge" class="badge b-idle"><div class="dot"></div><span id="badgeText">Monitoring</span></div>
  <div><div class="timer-label">Response Time</div><div class="timer" id="timer">00:00</div></div>
</div>

<div class="pipeline">
  <div class="pipe-step" id="ps-scan"><div class="num">1</div>Scan</div><div class="pipe-arrow" id="pa-1">&#8594;</div>
  <div class="pipe-step" id="ps-match"><div class="num">2</div>Match</div><div class="pipe-arrow" id="pa-2">&#8594;</div>
  <div class="pipe-step" id="ps-notify"><div class="num">3</div>Notify</div><div class="pipe-arrow" id="pa-3">&#8594;</div>
  <div class="pipe-step" id="ps-respond"><div class="num">4</div>Respond</div><div class="pipe-arrow" id="pa-4">&#8594;</div>
  <div class="pipe-step" id="ps-research"><div class="num">5</div>Research</div><div class="pipe-arrow" id="pa-5">&#8594;</div>
  <div class="pipe-step" id="ps-report"><div class="num">6</div>Report</div>
</div>

<div class="main" id="mainArea">
  <!-- LEFT: changes per phase -->
  <div class="left-panel" id="leftPanel">
    <div id="monitorScreen">
      <div class="slabel">Live Threat Feed</div>
      <div class="monitor-feed" id="monFeed"></div>
      <div id="msScanned" style="display:none;">0</div><div id="msClean" style="display:none;">0</div><div id="msThreats" style="display:none;">0</div><div id="msUptime" style="display:none;">0h</div>
    </div>
  </div>
  <!-- RIGHT: persistent incident log -->
  <div class="right-panel">
    <div class="slabel">Incident Log</div>
    <div class="log-feed" id="incidentLog"></div>
    <div class="time-bar" id="timeBar">
      <div class="tb-row"><div class="tb-label" style="color:var(--green);">Sentinel</div><div class="tb-barbg"><div class="tb-fill" id="tbSentinel" style="width:0%;background:linear-gradient(90deg,var(--green),var(--cyan));"></div></div><div class="tb-time" id="tbTime" style="color:var(--green);">—</div></div>
      <div class="tb-row"><div class="tb-label" style="color:var(--red);">Industry</div><div class="tb-barbg"><div class="tb-fill" id="tbIndustry" style="width:0%;background:linear-gradient(90deg,var(--red),var(--orange));"></div></div><div class="tb-time" style="color:var(--red);">277 days</div></div>
    </div>
  </div>
</div>

<div class="footer">
  Powered by <span class="sp">Anthropic</span><span class="sep">|</span><span class="sp">Auth0</span><span class="sep">|</span>
  <span class="sp">Ghost</span><span class="sep">|</span><span class="sp">Bland AI</span><span class="sep">|</span>
  <span class="sp">Airbyte</span><span class="sep">|</span><span class="sp">Aerospike</span><span class="sep">|</span>
