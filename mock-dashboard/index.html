<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL — Autonomous Breach Response</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#000000;--panel:#080808;--card:#111111;--card2:#1a1a1a;--border:#1e1e1e;
  --t1:#e4e4e7;--t2:#a1a1aa;--t3:#52525b;
  --red:#ef4444;--orange:#f97316;--yellow:#eab308;--green:#22c55e;--blue:#e4e4e7;--purple:#a78bfa;--cyan:#67e8f9;
}
body{background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh;}
.mono{font-family:'JetBrains Mono',monospace;}

/* BG */
.bg-grid{display:none;}
.bg-glow{display:none;}

/* Banner */
.banner{position:relative;z-index:10;padding:10px 28px;display:flex;align-items:center;justify-content:space-between;
  background:#080808;border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:12px;}
.brand .shield{width:36px;height:36px;border-radius:9px;background:#1a1a1a;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:18px;}
.brand h1{font-size:18px;font-weight:800;}
.brand .accent{color:var(--t1);}
.brand .sub{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}
.badge{padding:6px 16px;border-radius:20px;font-weight:700;font-size:12px;display:flex;align-items:center;gap:8px;
  letter-spacing:.5px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;transition:all .5s;}
.badge .dot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 8px currentColor;animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
.b-idle{background:rgba(71,85,105,.12);color:#64748b;border:1px solid rgba(71,85,105,.25);}
.b-idle .dot{background:#64748b;}
.b-scan{background:rgba(161,161,170,.1);color:#d4d4d8;border:1px solid rgba(161,161,170,.2);}
.b-scan .dot{background:#d4d4d8;}
.b-red{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25);box-shadow:0 0 20px rgba(239,68,68,.1);}
.b-red .dot{background:var(--red);}
.b-orange{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.25);}
.b-orange .dot{background:var(--orange);}
.b-green{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25);box-shadow:0 0 20px rgba(34,197,94,.1);}
.b-green .dot{background:var(--green);animation:none;}
.timer{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--t1);}
.timer-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;text-align:right;}

/* Pipeline */
.pipeline{position:relative;z-index:10;display:flex;align-items:stretch;padding:0 28px;height:64px;
  background:#080808;border-bottom:1px solid var(--border);gap:0;}
.pipe-step{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);
  border-bottom:3px solid transparent;transition:all .4s;position:relative;}
.pipe-step .num{width:22px;height:22px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;
  background:var(--card);border:1.5px solid var(--border);font-weight:700;transition:all .4s;}
.pipe-step.active{color:var(--t1);border-bottom-color:var(--t1);}
.pipe-step.active .num{background:var(--t1);color:#000;border-color:var(--t1);}
.pipe-step.done{color:var(--green);}
.pipe-step.done .num{background:var(--green);color:#fff;border-color:var(--green);}
.pipe-arrow{display:flex;align-items:center;color:var(--border);font-size:14px;padding:0 2px;transition:color .4s;}
.pipe-arrow.done{color:var(--green);}
.pipeline.tabbed{gap:4px;padding:6px 28px;}
.pipeline.tabbed .pipe-arrow{display:none;}
.pipeline.tabbed .pipe-step{cursor:pointer;border:1px solid var(--border);border-bottom:2px solid transparent;
  border-radius:6px;padding:0 14px;height:42px;transition:all .2s;}
.pipeline.tabbed .pipe-step .num{display:none;}
.pipeline.tabbed .pipe-step:hover{background:rgba(255,255,255,.04);border-color:var(--t3);}
.pipeline.tabbed .pipe-step.tab-active{background:rgba(255,255,255,.06);border-color:var(--t2);color:var(--t1);border-bottom-color:var(--t1);}
.pipeline.tabbed .pipe-step.done{color:var(--t3);}

/* Main content — fixed two-column layout */
.main{position:relative;z-index:10;height:calc(100vh - 160px);display:grid;grid-template-columns:1fr 400px;overflow:hidden;}
.left-panel{padding:20px 24px;overflow-y:auto;scrollbar-width:none;border-right:1px solid var(--border);display:flex;flex-direction:column;}
.left-panel::-webkit-scrollbar{display:none;}
.right-panel{padding:20px 24px;display:flex;flex-direction:column;overflow:hidden;}
.right-panel .log-feed{flex:1;overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.right-panel .log-feed::-webkit-scrollbar{width:5px;}
.right-panel .log-feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.slabel{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);font-weight:700;margin-bottom:12px;}

/* Monitor screen */
#monitorScreen{display:flex;flex-direction:column;flex:1;}
.monitor-feed{flex:1;overflow:hidden;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.9;color:var(--t3);}
.monitor-feed .mf-ok{color:var(--green);opacity:.5;}
.monitor-feed .mf-info{color:var(--t3);}
.monitor-feed .mf-time{color:#1e293b;margin-right:6px;}
.monitor-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:auto;}
.mstat{background:var(--card);border-radius:8px;padding:12px;border:1px solid var(--border);text-align:center;}
.mstat .msv{font-size:24px;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--green);}
.mstat .msl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.source-list{flex:1;overflow:hidden;}
.source-item{padding:6px 10px;margin-bottom:4px;border-radius:6px;background:var(--card);border-left:2px solid var(--green);
  font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--t3);display:flex;justify-content:space-between;opacity:.6;}
.source-item .src-status{color:var(--green);font-weight:600;}

/* Scan animation */
.scan-vis{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;grid-column:1/-1;}
.scan-domains{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--t3);line-height:2;text-align:center;max-height:300px;overflow:hidden;}
.scan-domains .hit{color:var(--red);font-weight:700;text-shadow:0 0 10px rgba(239,68,68,.3);}
.scan-domains .checked{color:var(--green);opacity:.4;}
.scan-counter{font-size:14px;color:var(--t2);margin-top:16px;font-family:'JetBrains Mono',monospace;}
.scan-counter b{color:var(--t1);font-size:20px;}

/* Breach found flash */
.breach-flash{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;grid-column:1/-1;animation:flashIn .3s ease;}
@keyframes flashIn{from{opacity:0;}to{opacity:1;}}
.breach-flash h2{font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.breach-flash .detail{color:var(--t2);font-size:13px;max-width:400px;text-align:center;line-height:1.6;font-family:'JetBrains Mono',monospace;}

/* Match visualization */
.match-grid{display:grid;grid-template-columns:repeat(25,1fr);gap:2px;margin-bottom:16px;}
.dot{width:100%;aspect-ratio:1;border-radius:2px;background:#1e293b;transition:all .3s;}
.dot.crit{background:var(--red);box-shadow:0 0 4px rgba(239,68,68,.3);}
.dot.warn{background:var(--yellow);box-shadow:0 0 4px rgba(234,179,8,.3);}
.dot.safe{background:var(--green);opacity:.4;}
.match-stats{display:flex;gap:16px;margin-top:12px;}
.match-stat{flex:1;background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);text-align:center;position:relative;overflow:hidden;}
.match-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.match-stat.ms-c::before{background:var(--red);}
.match-stat.ms-w::before{background:var(--yellow);}
.match-stat.ms-s::before{background:var(--green);}
.match-stat .mv{font-size:32px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.ms-c .mv{color:var(--red);}
.ms-w .mv{color:var(--yellow);}
.ms-s .mv{color:var(--green);}
.match-stat .ml{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-top:4px;}

/* User cards (horizontal) */
.user-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.ucard{background:var(--card);border-radius:10px;padding:12px;border:1px solid var(--border);transition:all .4s;position:relative;overflow:hidden;font-size:12px;}
.ucard.uc-noanswer{opacity:.7;}
.ucard.uc-noanswer::before{background:var(--yellow)!important;}
.ucard.uc-unlocked::before{background:var(--green)!important;box-shadow:0 0 15px rgba(34,197,94,.3)!important;}
.ucard.uc-locked::before{background:var(--red)!important;}
.ucard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border);transition:all .5s;}
.ucard.uc-active::before{background:var(--t2);}
.ucard.uc-done::before{background:var(--green);box-shadow:0 0 15px rgba(34,197,94,.3);}
.ucard .uname{font-size:15px;font-weight:700;}
.ucard .uemail{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.ucard .ubadge{display:inline-block;font-size:9px;padding:3px 8px;border-radius:5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:6px;
  background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2);}
.ucard .usteps{margin-top:12px;display:flex;flex-direction:column;gap:6px;}
.ustep{font-size:12px;display:flex;align-items:center;gap:8px;color:var(--t3);font-weight:500;transition:color .3s;}
.ustep.s-done{color:var(--green);}
.ustep.s-active{color:var(--yellow);}
.ustep .si{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .3s;}
.si.si-pending{background:rgba(71,85,105,.15);color:var(--t3);}
.si.si-active{background:rgba(161,161,170,.15);color:var(--t2);animation:pulse 1s infinite;}
.si.si-done{background:rgba(34,197,94,.15);color:var(--green);}

/* Waveform */
.wave{display:none;margin-top:10px;padding:8px 12px;background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.15);
  border-radius:8px;align-items:center;gap:8px;}
.wave.active{display:flex;}
.wave-label{font-size:10px;color:var(--purple);font-weight:700;white-space:nowrap;}
.wave-bars{display:flex;align-items:center;gap:2px;flex:1;height:20px;}
.wbar{width:3px;background:var(--purple);border-radius:2px;animation:wv .8s ease-in-out infinite alternate;}
@keyframes wv{0%{height:3px;opacity:.3;}100%{height:18px;opacity:1;}}

/* Decision cards */
.decision-card{background:rgba(139,92,246,.05);border:1px solid rgba(139,92,246,.15);border-radius:10px;padding:14px;margin-bottom:10px;animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.decision-card .dname{font-weight:700;font-size:14px;margin-bottom:6px;}
.decision-card .daction{font-weight:800;font-size:13px;margin-bottom:4px;}
.decision-card .dreason{font-size:12px;color:var(--t2);line-height:1.5;}

/* Log feed (compact) */
.log-feed{display:flex;flex-direction:column;gap:4px;}
.lf-entry{padding:8px 12px;border-radius:8px;background:var(--card);border-left:3px solid var(--border);
  font-size:12px;line-height:1.5;animation:fadeUp .3s ease;}
.lf-entry .lf-time{font-family:'JetBrains Mono',monospace;color:var(--t3);font-size:10px;margin-right:6px;}
.lf-entry.lf-action{border-left-color:var(--t3);}
.lf-entry.lf-crit{border-left-color:var(--red);background:rgba(239,68,68,.03);}
.lf-entry.lf-success{border-left-color:var(--green);}
.lf-entry.lf-decision{border-left-color:var(--purple);background:rgba(139,92,246,.04);}
.lf-entry b{color:var(--t1);font-weight:600;}

/* API ticker */
.api-tick{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;margin-bottom:2px;border-radius:4px;
  background:rgba(6,10,19,.6);border:1px solid #1a2440;display:flex;gap:6px;color:var(--t3);animation:fadeUp .2s ease;}
.api-tick .am{color:var(--cyan);font-weight:700;}
.api-tick .aok{color:var(--green);font-weight:700;}

/* Time compare bar */
.time-bar{display:none;padding:12px 28px;background:#080808;border-top:1px solid var(--border);
  align-items:center;gap:20px;}
.time-bar.visible{display:flex;}
.tb-row{display:flex;align-items:center;gap:10px;flex:1;}
.tb-label{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;min-width:90px;}
.tb-barbg{flex:1;height:8px;background:var(--card);border-radius:4px;overflow:hidden;}
.tb-fill{height:100%;border-radius:4px;transition:width 2s cubic-bezier(.16,1,.3,1);}
.tb-time{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;min-width:70px;text-align:right;}

/* Complete summary */
.complete-summary{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;grid-column:1/-1;text-align:center;}
.complete-summary h2{font-size:28px;font-weight:900;color:var(--green);margin-bottom:16px;}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:700px;margin:16px 0;}
.sg-item{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);}
.sg-item .sv{font-size:28px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.sg-item .sl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}

/* Data pipeline — stage-based horizontal flow */
.dp-wrap{flex:1;display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:none;}
.dp-wrap::-webkit-scrollbar{display:none;}
.dp-stage{margin-bottom:14px;animation:fadeUp .3s ease;}
.dp-stage-header{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);
  margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.dp-stage-header::after{content:'';flex:1;height:1px;background:var(--border);}
.dp-stage-nodes{display:flex;gap:6px;flex-wrap:wrap;}
.dp-node{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;min-width:130px;opacity:0;transform:translateX(-8px);
  transition:all .4s cubic-bezier(.16,1,.3,1);}
.dp-node.vis{opacity:1;transform:translateX(0);}
.dp-node.n-active{border-color:var(--t3);}
.dp-node.n-active .dp-ico-wrap{box-shadow:0 0 10px rgba(255,255,255,.05);}
.dp-node.n-done{border-color:rgba(34,197,94,.25);}
.dp-node.n-done .dp-ico-wrap{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.04);}
.dp-node.n-done .dp-name{color:var(--t1);}
.dp-ico-wrap{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;}
.dp-ico-wrap .dp-ico{font-size:15px;}
.dp-node-info{display:flex;flex-direction:column;gap:1px;}
.dp-name{font-size:11px;font-weight:600;color:var(--t3);transition:color .3s;}
.dp-sponsor{font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.sp-claude{color:#d4a574!important;}
.sp-aerospike{color:#f87171!important;}
.sp-senso{color:#34d399!important;}
.sp-airbyte{color:#a5b4fc!important;}
.sp-ghost{color:#c084fc!important;}
.sp-overmind{color:#818cf8!important;}
.sp-truefoundry{color:#fbbf24!important;}
.sp-auth0{color:#fb923c!important;}
.sp-bland{color:#60a5fa!important;}
/* Stage arrow */
.dp-arrow{display:flex;align-items:center;justify-content:center;margin:4px 0;color:var(--border);font-size:16px;transition:color .4s;}
.dp-arrow.arr-done{color:rgba(34,197,94,.4);}
.dp-arrow svg{width:20px;height:20px;}
/* Status badge on node */
.dp-node .dp-stat{font-size:7px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:auto;
  font-family:'JetBrains Mono',monospace;letter-spacing:.3px;}
.dp-stat-run{background:rgba(161,161,170,.08);color:var(--t3);}
.dp-stat-done{background:rgba(34,197,94,.1);color:var(--green);}

/* Report */
.report-section{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);
  margin-bottom:8px;animation:fadeUp .3s ease;}
.report-section .rs-title{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.report-section .rs-body{font-size:11px;color:var(--t2);line-height:1.6;}
.report-section .rs-body b{color:var(--t1);}
.report-badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.5px;}

/* Download buttons */
.dl-btn{flex:1;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--card);
  color:var(--t1);font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;}
.dl-btn:hover{background:var(--card2);border-color:var(--t3);}

/* Footer */
.footer{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:8px 28px;background:#080808;
  border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;color:var(--t3);}
.footer .sp{color:var(--t2);font-weight:500;}
.footer .sep{color:#1e293b;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow bg-g1"></div>
<div class="bg-glow bg-g2"></div>

<div class="banner">
  <div class="brand"><div class="shield">&#128737;</div><div><h1><span class="accent">SENTINEL</span></h1><div class="sub">Autonomous Breach Response</div></div></div>
  <div id="badge" class="badge b-idle"><div class="dot"></div><span id="badgeText">Monitoring</span></div>
  <div><div class="timer-label">Response Time</div><div class="timer" id="timer">00:00</div></div>
</div>

<div class="pipeline">
  <div class="pipe-step" id="ps-scan"><div class="num">1</div>Scan</div><div class="pipe-arrow" id="pa-1">&#8594;</div>
  <div class="pipe-step" id="ps-match"><div class="num">2</div>Match</div><div class="pipe-arrow" id="pa-2">&#8594;</div>
  <div class="pipe-step" id="ps-notify"><div class="num">3</div>Notify</div><div class="pipe-arrow" id="pa-3">&#8594;</div>
  <div class="pipe-step" id="ps-respond"><div class="num">4</div>Respond</div><div class="pipe-arrow" id="pa-4">&#8594;</div>
  <div class="pipe-step" id="ps-research"><div class="num">5</div>Research</div><div class="pipe-arrow" id="pa-5">&#8594;</div>
  <div class="pipe-step" id="ps-report"><div class="num">6</div>Report</div>
</div>

<div class="main" id="mainArea">
  <!-- LEFT: changes per phase -->
  <div class="left-panel" id="leftPanel">
    <div id="monitorScreen">
      <div class="slabel">Live Threat Feed</div>
      <div class="monitor-feed" id="monFeed"></div>
      <div id="msScanned" style="display:none;">0</div><div id="msClean" style="display:none;">0</div><div id="msThreats" style="display:none;">0</div><div id="msUptime" style="display:none;">0h</div>
    </div>
  </div>
  <!-- RIGHT: persistent incident log -->
  <div class="right-panel">
    <div class="slabel">Incident Log</div>
    <div class="log-feed" id="incidentLog"></div>
    <div class="time-bar" id="timeBar">
      <div class="tb-row"><div class="tb-label" style="color:var(--green);">Sentinel</div><div class="tb-barbg"><div class="tb-fill" id="tbSentinel" style="width:0%;background:linear-gradient(90deg,var(--green),var(--cyan));"></div></div><div class="tb-time" id="tbTime" style="color:var(--green);">—</div></div>
      <div class="tb-row"><div class="tb-label" style="color:var(--red);">Industry</div><div class="tb-barbg"><div class="tb-fill" id="tbIndustry" style="width:0%;background:linear-gradient(90deg,var(--red),var(--orange));"></div></div><div class="tb-time" style="color:var(--red);">277 days</div></div>
    </div>
  </div>
</div>

function updateTimer(){if(!timerStart)return;const e=Math.floor((Date.now()-timerStart)/1000);

function setBadge(cls,txt){$('badge').className='badge '+cls;$('badgeText').textContent=txt;}
function setPhase(name){
  const p=['scan','match','notify','respond','research','report'],i=p.indexOf(name);
  p.forEach((s,j)=>{const el=$('ps-'+s),ar=$('pa-'+(j+1));
    if(!el)return;
    if(j<i){el.className='pipe-step done';if(ar)ar.className='pipe-arrow done';}
    else if(j===i){el.className='pipe-step active';}
    else{el.className='pipe-step';if(ar)ar.className='pipe-arrow';}});}

const phaseSnapshots={};

function setLeft(html){leftPanel.innerHTML=html;}

function saveSnapshot(phase){

}

function enableTabs(){
  pipelineComplete=true;
  document.querySelector('.pipeline').classList.add('tabbed');
  const phases=['scan','match','notify','respond','research','report'];
  phases.forEach(p=>{
    const el=$('ps-'+p);

    el.addEventListener('click',()=>{
      if(!pipelineComplete)return;
      // Remove active from all
      phases.forEach(pp=>{const e=$('ps-'+pp);if(e)e.classList.remove('tab-active');});
      el.classList.add('tab-active');
      if(phaseSnapshots[p]) leftPanel.innerHTML=phaseSnapshots[p];

  });
}

// Add to incident log — newest on top
function ilog(msg,cls=''){
  const d=document.createElement('div');d.className='lf-entry '+(cls||'');
  d.innerHTML=`<span class="lf-time">${new Date().toTimeString().slice(0,8)}</span>${msg}`;
  iLog.prepend(d);
}
function iapi(method,url,status,ms){

  iLog.prepend(d);
}

function makeWaveBars(){let b='';for(let i=0;i<25;i++)b+=`<div class="wbar" style="animation-delay:${(Math.random()*.6).toFixed(2)}s"></div>`;return b;}

    <div class="ubadge">CRITICAL</div>
    <div class="ustatus" id="ust-${uid}" style="font-size:11px;color:var(--t3);margin-top:6px;font-weight:500;"></div>
    <div class="usteps" id="us-${uid}">${steps.map(s=>
    `<div class="ustep" id="${uid}-${s.id}"><div class="si si-pending">&#8226;</div><span>${s.text}</span></div>`).join('')}</div>
    <div class="wave" id="wv-${uid}"><div class="wave-label">&#128266; LIVE</div><div class="wave-bars">${makeWaveBars()}</div></div></div>`;}

function setUserStatus(email,text,color){
  const uid=email.replace(/[@.]/g,'-'),el=document.getElementById('ust-'+uid);
  if(el){el.textContent=text;el.style.color=color||'var(--t3)';}
}
function setActionText(email,stepId,text){
  const uid=email.replace(/[@.]/g,'-'),el=document.getElementById(`${uid}-${stepId}`);
  if(el){const sp=el.querySelector('span');if(sp)sp.textContent=text;}
}

function setStep(email,stepId,state){
  const uid=email.replace(/[@.]/g,'-'),el=document.getElementById(`${uid}-${stepId}`);
  if(!el)return;const si=el.querySelector('.si');
  el.className='ustep'+(state==='done'?' s-done':state==='active'?' s-active':'');
  si.className='si si-'+state;
  si.innerHTML=state==='done'?'&#10003;':state==='active'?'&#8987;':'&#8226;';}
function setCardState(email,cls){const uid=email.replace(/[@.]/g,'-'),el=document.getElementById('uc-'+uid);if(el)el.className='ucard '+cls;}
function setWave(email,on){const uid=email.replace(/[@.]/g,'-'),el=document.getElementById('wv-'+uid);if(el)el.className='wave'+(on?' active':'');}

function addLog(container,msg,cls=''){
  const d=document.createElement('div');d.className='lf-entry '+(cls||'');
  d.innerHTML=`<span class="lf-time">${new Date().toTimeString().slice(0,8)}</span>${msg}`;
  container.appendChild(d);container.scrollTop=container.scrollHeight;}
function addApi(container,method,url,status,ms){
  const d=document.createElement('div');d.className='api-tick';
  d.innerHTML=`<span class="am">${method}</span><span>${url}</span><span class="aok">${status}</span><span>${ms}ms</span>`;
  container.appendChild(d);container.scrollTop=container.scrollHeight;}

async function callBland(user){
  try{
    const r=await fetch('/api/bland/call',{method:'POST',headers:{'x-bland-key':BLAND_API_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({phone_number:user.phone,from:null,
        task:`You are Alex from Acme Corp security. Be natural and conversational but don't ramble. Keep your default responses to 2-3 sentences. But if the user asks a question or wants more detail, give them a proper answer — 3-5 sentences is fine when they're asking for clarification. Never repeat something you already said unless they specifically ask you to.

SITUATION: darkforum_x (e-commerce site) was breached two days ago. ${user.name}'s email (${user.email}) and password hash were in the leaked dump. The hash matches their Acme Corp account, meaning they reused their password. We've temporarily locked their account as a precaution.

CALL FLOW:
1. The first sentence already covered the basics. Ask if they have questions or want more detail about what happened.
2. If they ask questions, answer them naturally and thoroughly. Don't rush them.
3. When they're ready, ask: "Would you like us to keep your account locked until you reset your password, or would you prefer we unlock it now?"
4. Confirm their choice in one sentence.
5. Tell them to reset at acme.com/reset and change the password anywhere else they used it.
6. Ask if there's anything else. If not, wrap up.

IF THEY ASK QUESTIONS — give real answers:
- What is darkforum_x: "It's a third-party e-commerce platform that got breached about two days ago. Hackers got into their database and posted the user credentials online."
- How did you find my data: "We run automated scans of dark web sources and breach databases. Your email and password hash showed up in the dump, and when we compared the hash to what we have on file, it matched."
- Was my account accessed by anyone: "Not that we can tell. We locked it as soon as we detected the match, so we believe we caught it in time. There's no sign of unauthorized access."
- What's a password hash: "It's an encrypted version of your password. The fact that the hash from the leak matches ours means you used the same password on both sites."
- How bad is this: "The main risk is that someone could use the leaked credentials to log into your Acme account. But since we've already locked it, that's not possible right now."
- Talk to a human: "Absolutely, you can email security at acme dot com and someone from the team will follow up within 24 hours."

STYLE: Warm, professional, human. After you speak, wait for them to respond. Don't over-explain unprompted, but don't be robotic either.`,
        first_sentence:`Hey ${user.name}, this is Alex from Acme Corp security. A site called darkforum x was breached and your credentials were in the leak, so we've locked your account as a precaution. Do you have any questions about what happened, or should I jump straight to next steps?`,
        max_duration:10,record:true,voice:"mason",wait_for_greeting:false,language:"en",temperature:0.7,
        interruption_threshold:null,block_interruptions:true,background_track:"none",noise_cancellation:true})});
    return await r.json();
  }catch(e){return{status:'error',error:e.message};}
}

// ===== MONITORING LOOP =====
const monSources=['pastebin.com','ghostbin.me','haveibeenpwned.com','raidforums.cc','breachdb.io',
  'leakcheck.net','dehashed.com','snusbase.com','weleakinfo.to','databases.today','leak.sx',
  'cracked.io','nulled.to','exploit.in','xss.is','breached.vc','telegram/leaks_db','anonfiles.com',
  'mega.nz/dumps','discord/breach-alerts','darkforum_x.onion','ramp4u.io','hydra.market',
  'dread.onion','0day.today'];

let monInterval=null, monCount=0;

function startMonitoring(){
  const feed=$('monFeed');
  if(!feed)return;
  monCount=847;

  // Seed initial feed entries
  for(let i=0;i<15;i++){
    const src=monSources[Math.floor(Math.random()*monSources.length)];
    const t=new Date(Date.now()-((15-i)*800));
    const ts=t.toTimeString().slice(0,8);
    const d=document.createElement('div');
    d.innerHTML=`<span class="mf-time">${ts}</span> <span class="mf-ok">&#10003;</span> ${src} <span class="mf-info">— no new dumps</span>`;
    feed.appendChild(d);
  }
  feed.scrollTop=feed.scrollHeight;

  // Seed incident log with monitoring activity
  const monLogMsgs=[
    'Monitoring 25 dark web sources — all clear',
    'Scheduled scan cycle #847 complete',
    'Aerospike vector index: 847 breach records indexed',
    'Auth0 health check: all endpoints nominal',
    'Ghost DB: 50 user records, 0 active incidents',
  ];
  monLogMsgs.reverse().forEach(m=>ilog(m,'lf-success'));

  let monLogCount=0;
  const monLogInterval=setInterval(()=>{
    if(running)return clearInterval(monLogInterval);
    monLogCount++;
    monCount++;
    if(monLogCount%4===0) ilog(`Scan cycle #${monCount} — ${monSources[Math.floor(Math.random()*monSources.length)]} checked`,'');
  },3200);

  monInterval=setInterval(()=>{
    if(running)return clearInterval(monInterval);
    const src=monSources[Math.floor(Math.random()*monSources.length)];
    const now=new Date().toTimeString().slice(0,8);
    const d=document.createElement('div');
    d.innerHTML=`<span class="mf-time">${now}</span> <span class="mf-ok">&#10003;</span> ${src} <span class="mf-info">— no new dumps</span>`;
    feed.appendChild(d);
    if(feed.children.length>40)feed.removeChild(feed.firstChild);
    feed.scrollTop=feed.scrollHeight;
  },800);
}

startMonitoring();

// ===== MAIN SIMULATION =====
async function run(){
  if(running)return;running=true;
  timerStart=Date.now();timerInt=setInterval(updateTimer,50);

  // === SCAN — inject breach into existing monitoring feed ===
  setPhase('scan');setBadge('b-scan','Deep Scan');
  ilog('<b>Deep scan initiated...</b>','lf-action');

  const feed=$('monFeed');
  if(feed){
    // Add a few more clean scans
    const cleanSites=['pastebin.com','ghostbin.me'];
    for(const site of cleanSites){
      const d=document.createElement('div');
      d.innerHTML=`<span class="mf-time">${new Date().toTimeString().slice(0,8)}</span> <span class="mf-ok">&#10003;</span> ${site} <span class="mf-info">— no new dumps</span>`;
      feed.appendChild(d);feed.scrollTop=feed.scrollHeight;
      ilog(`&#10003; ${site} — clean`,'lf-success');
      await sleep(400);
    }

    // THE BREACH
    await sleep(600);
    const hit=document.createElement('div');
    hit.style.cssText='color:var(--red);font-weight:700;padding:4px 0;';
    hit.innerHTML=`<span class="mf-time">${new Date().toTimeString().slice(0,8)}</span> &#9888; <b>darkforum_x.onion</b> — <span style="color:var(--red);">CREDENTIAL DUMP DETECTED — 150 records</span>`;
    feed.appendChild(hit);feed.scrollTop=feed.scrollHeight;
    ilog(`&#9888; <b>BREACH FOUND on darkforum_x.onion</b> — credential dump detected!`,'lf-crit');

    await sleep(1200);
    setBadge('b-red','Breach Found');

    // Add breach details as feed entries
    const details=[
      'Analyzing dump: darkforum_x.onion — 150 credential pairs (email + bcrypt hash)',
      'Source identified: third-party e-commerce platform compromise',
      'Dump date: March 25, 2026 — published 2 days ago',
      'Initiating automated incident response...',
    ];
    for(const line of details){
      const d=document.createElement('div');
      d.style.cssText='color:var(--t2);padding:1px 0;font-size:11px;';
      d.innerHTML=`<span class="mf-time">${new Date().toTimeString().slice(0,8)}</span> <span style="color:var(--red);">&#9654;</span> ${line}`;
      feed.appendChild(d);feed.scrollTop=feed.scrollHeight;
      await sleep(400);
    }
    ilog('&#128680; <b>BREACH DETECTED</b> — 150 credentials on darkforum_x.onion. Initiating response.','lf-crit');
  }
  await sleep(1500);
  saveSnapshot('scan');

  // === MATCH ===
  setPhase('match');setBadge('b-orange','Matching');
  ilog('Cross-referencing leaked credentials against user database...','lf-action');
  iapi('SELECT','ghost-db/users (50 rows)',200,12);

  setLeft(`<div class="slabel">Credential Matching &mdash; 150 Records</div>
    <div class="match-grid" id="mGrid"></div>
    <div class="match-stats"><div class="match-stat ms-c"><div class="mv" id="mcVal">-</div><div class="ml">Critical</div></div>
    <div class="match-stat ms-w"><div class="mv" id="mwVal">-</div><div class="ml">Warning</div></div>
    <div class="match-stat ms-s"><div class="mv" id="msVal">-</div><div class="ml">Safe</div></div></div>`);

  const mGrid=$('mGrid');
  for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot';d.id='dt-'+i;mGrid.appendChild(d);}

  for(let i=0;i<TOTAL;i++){
    const d=$('dt-'+i);
    if(CRIT_IDX.includes(i))d.className='dot crit';
    else if(WARN_IDX.includes(i))d.className='dot warn';
    else d.className='dot safe';
    if(i%8===0)await sleep(30);
  }

  const ac=(id,v,dur=800)=>{const el=$(id),s=parseInt(el.textContent)||0,t0=performance.now();
    (function f(n){const t=Math.min((n-t0)/dur,1);el.textContent=Math.round(s+(v-s)*(1-Math.pow(1-t,3)));if(t<1)requestAnimationFrame(f);})(performance.now());};
  ac('mcVal',8);await sleep(300);ac('mwVal',12);await sleep(300);ac('msVal',130);
  ilog('&#128308; <b>8 CRITICAL</b> — password hash match','lf-crit');
  await sleep(300);ilog('&#128992; <b>12 WARNING</b> — email match only','');
  await sleep(300);ilog('&#128994; <b>130 SAFE</b> — no match','lf-success');
  await sleep(1500);
  saveSnapshot('match');

  // === NOTIFY ===
  setPhase('notify');setBadge('b-orange','Calling Users');
  ilog('<b>Launching 8 concurrent voice calls to affected users...</b>','lf-action');

  const steps=[{id:'call',text:'Voice call'},{id:'transcript',text:'Transcript'},{id:'decision',text:'Decision'},{id:'action',text:'Account action'}];
  setLeft(`<div class="slabel">Affected Users &mdash; 8 Concurrent Calls</div>
    <div class="user-cards">${breachUsers.map(u=>userCardHTML(u,steps)).join('')}</div>`);

  for(const u of breachUsers){setStep(u.email,'call','active');setCardState(u.email,'uc-active');setWave(u.email,true);}

  // Mock transcripts
  const mockTranscripts={
    'sarah.chen@acme.com':{dec:'LOCK',reason:'User confirmed password reuse and explicitly requested lockdown.'},
    'mike.ross@acme.com':{dec:'LOCK',reason:'User acknowledged password reuse and consented to lockdown.'},
    'priya.patel@acme.com':{dec:'LOCK',reason:'User requested lockdown, will reset password tonight.'},
    'emma.wilson@acme.com':{dec:'LOCK',reason:'User confirmed willingness to reset. Account stays locked.'},
    'nina.zhao@acme.com':{dec:'UNLOCK',reason:'User needs immediate access for work. Requested unlock. Committed to resetting within the hour.'},
  };

  // Launch real Bland call for Alfred
  const alfred=breachUsers[1];let alfredCallId=null;
  const bResult=await callBland(alfred);
  if(bResult.call_id){alfredCallId=bResult.call_id;
    ilog(`&#128222; <b>${alfred.name}</b> — connected (LIVE CALL)`,'lf-action');
    iapi('POST','api.bland.ai/v1/calls',200,Math.floor(80+Math.random()*120));
  }else{ilog(`&#10060; ${alfred.name} call failed: ${JSON.stringify(bResult)}`,'lf-crit');}

  for(const u of breachUsers){
    if(!u.mock)continue;
    if(u.noAnswer) ilog(`&#128222; <b>${u.name}</b> — ringing...`,'lf-action');
    else ilog(`&#128222; <b>${u.name}</b> — connected`,'lf-action');
  }

  // Schedule mock completions
  const mockEvents=breachUsers.filter(u=>u.mock).map(u=>({user:u,finishAt:u.noAnswer?15:u.duration})).sort((a,b)=>a.finishAt-b.finishAt);
  let mockElapsed=0;
  const callResultsMap={};

  for(const ev of mockEvents){
    const wait=ev.finishAt-mockElapsed;
    if(wait>0&&!skipCalls)await sleep(wait*1000);
    mockElapsed=ev.finishAt;
    const u=ev.user;
    if(u.noAnswer){
      setWave(u.email,false);setStep(u.email,'call','active');setCardState(u.email,'uc-noanswer');
      ilog(`&#128308; <b>${u.name}</b> — no answer. Retry scheduled.`,'lf-crit');
      callResultsMap[u.email]={user:u,noAnswer:true,dec:'LOCK',reason:'User unreachable — locking as precaution. Retry scheduled.'};
    }else{
      const dur=u.duration>60?`${Math.floor(u.duration/60)}m ${String(u.duration%60).padStart(2,'0')}s`:`${u.duration}s`;
      setWave(u.email,false);setStep(u.email,'call','done');setStep(u.email,'transcript','done');
      ilog(`&#9989; <b>${u.name}</b> — call complete (${dur})`,'lf-success');
      const mt=mockTranscripts[u.email];
      callResultsMap[u.email]={user:u,noAnswer:false,dec:mt?mt.dec:'LOCK',reason:mt?mt.reason:'User consented to lockdown.'};
    }
  }

  // Poll Alfred's real call (skip if D pressed)
  let alfredTr=null,alfredLen=null;
  if(alfredCallId&&!skipCalls){
    ilog(`&#128266; Waiting for <b>${alfred.name}</b> live call to complete...`,'lf-action');
    for(let p=0;p<60&&!skipCalls;p++){
      try{const r=await fetch(`/api/bland/call/${alfredCallId}`,{headers:{'x-bland-key':BLAND_API_KEY}});
        const d=await r.json();
        if(d.status==='completed'||d.status==='ended'||d.queue_status==='complete'||d.completed){
          alfredLen=d.call_length||d.duration||null;
          alfredTr=d.concatenated_transcript||d.transcript||(d.transcripts?d.transcripts.map(t=>`${t.user}: ${t.text}`).join('\n'):null);
          break;}}catch(e){}
      await sleep(5000);}
  }
  if(skipCalls){ilog('Calls skipped — using default responses.','lf-action');}
  setWave(alfred.email,false);setStep(alfred.email,'call','done');setStep(alfred.email,'transcript','done');
  const durD=alfredLen?(alfredLen>60?`${Math.floor(alfredLen/60)}m ${Math.round(alfredLen%60)}s`:`${Math.round(alfredLen)}s`):'?';
  ilog(`&#9989; <b>${alfred.name}</b> — call complete (${durD})`,'lf-success');

  if(alfredTr){ilog(`&#128196; <b>Transcript:</b> <em style="font-size:11px;color:var(--t2);">${alfredTr.slice(0,300)}${alfredTr.length>300?'...':''}</em>`,'lf-action');}

  let alfredDec='LOCK',alfredReason='Keeping locked as safe default.';
  if(alfredTr){
    const t=alfredTr.toLowerCase();
    const wU=t.includes('unlock')||t.includes('open it')||t.includes('access it')||t.includes('keep it open')||t.includes("don't lock")||t.includes('need access');
    const wL=t.includes('keep it locked')||t.includes('lock it')||t.includes('keep locked')||t.includes('leave it locked')||t.includes('stay locked');
    if(wU&&!wL){alfredDec='UNLOCK';alfredReason='User explicitly requested unlock during live call.';}
    else if(wL){alfredReason='User explicitly requested account stay locked.';}
    else{alfredReason='No explicit unlock request — keeping locked as safe default.';}
  }
  callResultsMap[alfred.email]={user:alfred,noAnswer:false,dec:alfredDec,reason:alfredReason,live:true};

  ilog(`<b>All calls complete.</b> Transcripts collected.`,'lf-success');
  await sleep(1500);
  saveSnapshot('notify');

  // === RESPOND (merged decide + act) ===
  setPhase('respond');setBadge('b-orange','Responding');
  ilog('Claude analyzing transcripts + executing Auth0 actions...','lf-action');
  iapi('POST','truefoundry.io/gateway/v1/chat',200,1842);

  setLeft(`<div class="slabel">Analyze &amp; Respond</div><div class="user-cards">${breachUsers.map(u=>userCardHTML(u,steps)).join('')}</div>`);
  for(const u of breachUsers){
    const cr=callResultsMap[u.email];
    if(cr&&!cr.noAnswer){setStep(u.email,'call','done');setStep(u.email,'transcript','done');}
    else if(cr&&cr.noAnswer){setStep(u.email,'call','active');setCardState(u.email,'uc-noanswer');}
  }
  await sleep(1000);

  let locked=0,unlocked=0,retries=0;
  for(const u of breachUsers){
    const cr=callResultsMap[u.email];if(!cr)continue;
    // Decision
    setStep(u.email,'decision','active');await sleep(400);
    const act=cr.noAnswer?'LOCK (PRECAUTIONARY)':cr.dec+' ACCOUNT';
    setActionText(u.email,'decision',act);
    setStep(u.email,'decision','done');
    if(cr.noAnswer) setUserStatus(u.email,'No answer','var(--yellow)');
    else if(cr.dec==='UNLOCK') setUserStatus(u.email,'Requested unlock','var(--green)');
    else setUserStatus(u.email,'Consented to lock','var(--t2)');
    ilog(`&#129302; <b>${u.name}</b> — ${act}`,'lf-decision');
    // Immediately execute
    setStep(u.email,'action','active');await sleep(300);
    if(cr.noAnswer){
      iapi('PATCH',`auth0/${u.email.split('@')[0]}/block`,200,Math.floor(80+Math.random()*80));

## Implementation Tasks

### Task 1: Continuous Dark Web Monitoring
**Priority:** P0 — Critical
**Effort:** 2 days
**Dependencies:** Airbyte, Aerospike, Ghost DB

#### Requirements
- Airbyte connector runs every 15 minutes against dark web paste sites and breach databases
- New credential dumps ingested into Aerospike vector store for fast similarity search
- Each scan result stored in Ghost DB with timestamp and hash signature
- Duplicate detection via Aerospike vector similarity (threshold: 0.95)
- Alert pipeline triggers Sentinel agent on any match above 0 with registered users

#### Acceptance Criteria
- [ ] Airbyte source connector configured for: pastebin, ghostbin, dehashed, snusbase, breachdb
- [ ] Aerospike namespace \`breach_vectors\` created with vector index on credential hashes
- [ ] Ghost DB table \`continuous_scans\` logs every scan with results
- [ ] End-to-end test: inject test credential dump → Sentinel triggers within 60 seconds

---

### Task 2: Password Breach Check at Registration
**Priority:** P0 — Critical
**Effort:** 1 day
**Dependencies:** Auth0 Actions, HaveIBeenPwned API

#### Requirements
- Auth0 Action on \`post-registration\` and \`post-change-password\` hooks
- Check password hash against HaveIBeenPwned API using k-anonymity (SHA-1 prefix)
- Block registration if password appears in known breaches
- Log blocked attempts to Ghost DB for security analytics

#### Acceptance Criteria
- [ ] Auth0 Action deployed and active on both hooks
- [ ] Password \`password123\` blocked at registration
- [ ] Clean password \`xK9#mP2$vL7@nQ4\` allowed
- [ ] Blocked attempts logged with timestamp and anonymized hash prefix

---

### Task 3: Mandatory MFA for Compromised Accounts
**Priority:** P0 — Critical
**Effort:** 1 day
**Dependencies:** Auth0 MFA API

#### Requirements
- After any breach lockdown, reactivated accounts require MFA enrollment
- Support TOTP (authenticator app) and SMS as MFA factors
- Auth0 rule: if user.app_metadata.breach_affected === true → force MFA enrollment
- MFA enrollment flow integrated into acme.com/reset

#### Acceptance Criteria
- [ ] User with breach_affected flag cannot access app without MFA
- [ ] TOTP and SMS enrollment flows functional
- [ ] Flag automatically set by Sentinel during breach response
- [ ] Flag cleared after successful MFA enrollment + password reset

---

### Task 4: Credential Stuffing Detection
**Priority:** P1 — High
**Effort:** 3 days
**Dependencies:** Auth0 Attack Protection, Aerospike, Overmind

#### Requirements
- Rate limiting on /oauth/token: max 10 attempts per IP per minute
- Behavioral analysis: flag IPs attempting >5 unique usernames in 1 minute
- Cross-reference login attempts against known leaked credentials in Aerospike
- Overmind traces on all flagged login attempts for audit trail
- Auto-block IP + notify security team via Bland AI call if threshold exceeded

#### Acceptance Criteria
- [ ] Rate limiter active and tested with load tool
- [ ] Behavioral detector flags bulk username enumeration
- [ ] Known-leaked credential login attempt triggers alert
- [ ] Overmind dashboard shows credential stuffing traces
- [ ] Security team receives automated Bland AI notification on attack detection

---

### Task 5: Multi-Channel Notification Fallback
**Priority:** P1 — High
**Effort:** 2 days
**Dependencies:** Bland AI, Airbyte, Ghost DB

#### Requirements
- Primary: Bland AI voice call (current implementation)
- Fallback 1: SMS via Bland AI if voice call fails after 3 attempts
- Fallback 2: Email notification via SendGrid/SES
- Fallback 3: In-app banner on next login
- All notification attempts logged in Ghost DB with channel, timestamp, delivery status
- Airbyte sync notification logs to analytics warehouse for response rate analysis

#### Acceptance Criteria
- [ ] Voice call failure triggers SMS within 5 minutes
- [ ] SMS failure triggers email within 10 minutes
- [ ] In-app banner shown on next login regardless of other channels
- [ ] Ghost DB contains complete notification audit trail
- [ ] Analytics dashboard shows notification success rates by channel

---

### Task 6: Incident Knowledge Graph
**Priority:** P2 — Medium
**Effort:** 3 days
**Dependencies:** Aerospike Vector Search, Senso.ai, Claude

#### Requirements
- Every incident stored as vector embedding in Aerospike
- Embedding includes: breach type, source, scale, response actions, outcomes
- On new incident, vector search retrieves 10 most similar past incidents
- Claude analyzes patterns and generates incident-specific recommendations
- Senso.ai knowledge base updated with learnings after each incident
- Recommendations improve over time as incident corpus grows

#### Acceptance Criteria
- [ ] Incident SENTINEL-2026-0327-001 stored as vector in Aerospike
- [ ] Query "credential breach e-commerce" returns this incident in top 3
- [ ] Claude recommendations reference specific past incident outcomes
- [ ] Senso.ai knowledge base contains post-incident learnings
- [ ] Second similar incident produces measurably better recommendations

    }
  }

  // Show incident report PDF by default
  ra.innerHTML=`<button class="dl-btn" style="flex:1;" onclick="downloadReport('pdf')">Download PDF</button><button class="dl-btn" style="flex:1;" onclick="downloadReport('docx')">Download DOCX</button>`;
  await showPdfPreview('incident');

  $('rtab-incident').addEventListener('click',async()=>{
    activateTab('rtab-incident');
    ra.innerHTML=`<button class="dl-btn" style="flex:1;" onclick="downloadReport('pdf')">Download PDF</button><button class="dl-btn" style="flex:1;" onclick="downloadReport('docx')">Download DOCX</button>`;
    await showPdfPreview('incident');
  });
  $('rtab-research').addEventListener('click',async()=>{
    activateTab('rtab-research');
    ra.innerHTML=`<button class="dl-btn" style="flex:1;" onclick="downloadReport('pdf','research')">Download PDF</button><button class="dl-btn" style="flex:1;" onclick="downloadReport('docx','research')">Download DOCX</button>`;
    await showPdfPreview('research');
  });

  ilog('<b>Incident report + research report generated.</b>','lf-success');
  saveSnapshot('report');
  await sleep(1000);

  // Final state
  setBadge('b-green','Complete');

  clearInterval(timerInt);updateTimer();
  document.querySelector('#badge .dot').style.animation='none';

  const elapsed=Math.floor((Date.now()-timerStart)/1000),em=Math.floor(elapsed/60),es=elapsed%60;
  ilog(`<b>&#128737; SENTINEL COMPLETE</b> — ${locked} locked, ${unlocked} unlocked. Report generated. ${em}m ${es}s total.`,'lf-success');

  // Enable pipeline tabs for review
  enableTabs();
  // Start on report tab
  $('ps-report').classList.add('tab-active');

  $('timeBar').classList.add('visible');
  $('tbTime').textContent=`${em}m ${es}s`;
  await sleep(100);$('tbSentinel').style.width='2%';$('tbIndustry').style.width='100%';
}

  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${title} — SENTINEL-2026-0327-001</title>
<style>

async function downloadReport(fmt,type){
  const html=buildReportHTML(type||'incident');
  if(!html)return;
  const fname=type==='research'?'Research_Report_SENTINEL-2026-0327-001':'Incident_Report_SENTINEL-2026-0327-001';

  if(fmt==='pdf'){
    try{
      const resp=await fetch('/api/report/pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({html})});
      if(!resp.ok)throw new Error('PDF generation failed');
      const blob=await resp.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=fname+'.pdf';a.click();
      URL.revokeObjectURL(url);
      ilog(`&#128196; <b>PDF downloaded</b> — ${fname}.pdf`,'lf-success');
    }catch(e){ilog('&#10060; PDF generation failed: '+e.message,'lf-crit');}
  }else{
    // DOCX via Word-compatible HTML
    const docHtml=html.replace('<!DOCTYPE html>','').replace('<html>',
      '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word">');
    const blob=new Blob(['\ufeff'+docHtml],{type:'application/msword'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=fname+'.doc';a.click();
    URL.revokeObjectURL(url);
    ilog(`&#128196; <b>DOCX downloaded</b> — ${fname}.doc`,'lf-success');
  }
}

  else if((e.key==='d'||e.key==='D')&&running&&canSkip)skipCalls=true;
});
